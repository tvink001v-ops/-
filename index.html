<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YouTuba</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',Arial,sans-serif;
            background:linear-gradient(180deg,#87CEEB,#4A90E2,#2E5FA1);
            min-height:100vh;color:#2C3E50;
        }
        .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
        .header{
            background:rgba(255,255,255,0.45);backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);padding:15px 20px;
            position:sticky;top:0;z-index:100;display:flex;
            align-items:center;justify-content:space-between;
            border-radius:0 0 20px 20px;
        }
        .logo{height:28px;cursor:pointer}
        .btn{
            padding:10px 20px;border-radius:25px;border:none;color:white;
            font-weight:bold;cursor:pointer;font-size:14px;
        }
        .btn:active{transform:scale(0.95)}
        .btn-up{background:linear-gradient(180deg,#5DADE2,#2E86C1)}
        .content{flex:1;padding:20px}
        .card{
            background:rgba(255,255,255,0.45);backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);border-radius:20px;padding:15px;
            margin-bottom:15px;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,0.2);
            position:relative;overflow:hidden;
        }
        .card:active{transform:scale(0.98)}
        .card::before{
            content:'';position:absolute;top:0;left:0;right:0;height:50%;
            background:linear-gradient(180deg,rgba(255,255,255,0.3),transparent);
            pointer-events:none;border-radius:20px 20px 0 0;
        }
        .card h3{color:#1a5276;margin-bottom:5px;position:relative;z-index:1}
        .card p{color:#5D6D7E;font-size:13px;position:relative;z-index:1}
        .page{display:none}
        .page.active{display:block}
        .back{
            background:rgba(255,255,255,0.45);padding:10px 20px;
            border-radius:25px;cursor:pointer;margin-bottom:15px;
            display:inline-block;font-weight:bold;color:white;
        }
        video{
            width:100%;border-radius:20px;margin-bottom:15px;
            background:#000;box-shadow:0 8px 32px rgba(0,0,0,0.3);
        }
        .details{
            background:rgba(255,255,255,0.45);backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);border-radius:20px;padding:20px;
        }
        .details h2{color:#1a5276;margin-bottom:10px}
        .actions{margin-top:15px;display:flex;gap:10px;flex-wrap:wrap}
        .btn-like{background:linear-gradient(180deg,#7DCEA0,#27AE60)}
        .btn-share{background:linear-gradient(180deg,#5DADE2,#2E86C1)}
        .badge{
            background:rgba(255,255,255,0.3);padding:4px 10px;
            border-radius:15px;font-size:12px;display:inline-block;margin-right:5px;
        }
        .toast{
            position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
            background:#27AE60;color:white;padding:15px 25px;
            border-radius:25px;font-weight:bold;z-index:1000;display:none;
        }
        .toast.show{display:block;animation:up 0.5s}
        @keyframes up{
            from{transform:translateX(-50%) translateY(100px);opacity:0}
            to{transform:translateX(-50%) translateY(0);opacity:1}
        }
        .empty{text-align:center;padding:60px 20px;color:#5D6D7E}
        .empty-icon{font-size:60px;margin-bottom:15px}
        .input{
            width:100%;padding:12px 15px;border-radius:15px;
            border:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.3);
            margin-bottom:10px;font-size:16px;outline:none;color:#2C3E50;
        }
        .file-label{
            display:block;padding:15px;background:rgba(255,255,255,0.45);
            border:2px dashed rgba(255,255,255,0.4);border-radius:15px;
            cursor:pointer;margin-bottom:15px;text-align:center;word-break:break-all;
        }
        .file-inp{display:none}
        .green-btn{
            width:100%;padding:15px;background:linear-gradient(180deg,#7DCEA0,#27AE60);
            border:none;border-radius:25px;color:white;font-size:18px;
            font-weight:bold;cursor:pointer;margin-top:10px;
        }
        .green-btn:disabled{opacity:0.5}
        .progress{
            margin:15px 0;background:rgba(255,255,255,0.3);
            border-radius:15px;height:8px;overflow:hidden;display:none;
        }
        .progress-fill{
            height:100%;background:#27AE60;border-radius:15px;
            width:0%;transition:width 0.3s;
        }
        .nav{
            position:sticky;bottom:0;background:rgba(255,255,255,0.45);
            backdrop-filter:blur(20px);padding:15px;display:flex;
            justify-content:space-around;border-radius:20px 20px 0 0;
        }
        .nav-btn{
            background:none;border:none;color:white;font-weight:bold;
            cursor:pointer;font-size:14px;padding:10px 20px;border-radius:20px;
        }
        .nav-btn.active{background:rgba(255,255,255,0.3)}
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Logo_of_YouTube_%282006-2011%29.svg" class="logo" onclick="show('main')">
            <button class="btn btn-up" onclick="show('upload')">⬆️ Загрузить</button>
        </div>

        <div class="content page active" id="main">
            <button class="btn" style="background:#5DADE2;margin-bottom:15px;" onclick="loadVideos()">🔄 Обновить</button>
            <div id="list"></div>
        </div>

        <div class="content page" id="video">
            <span class="back" onclick="show('main')">⬅️ Назад</span>
            <div id="player"></div>
        </div>

        <div class="content page" id="upload">
            <span class="back" onclick="show('main')">⬅️ Назад</span>
            <input type="text" class="input" id="title" placeholder="📝 Название видео">
            <label class="file-label" for="file" id="fileLabel">📁 Выбрать видео</label>
            <input type="file" class="file-inp" id="file" accept="video/*">
            <div class="progress" id="bar"><div class="progress-fill" id="fill"></div></div>
            <button class="green-btn" id="submitBtn" onclick="upload()">✨ Загрузить на Диск</button>
        </div>

        <div class="nav">
            <button class="nav-btn active" data-p="main" onclick="show('main')">🏠 Главная</button>
            <button class="nav-btn" data-p="upload" onclick="show('upload')">⬆️ Загрузить</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyneIOIM5F9MAfE1ddf7inB-w4P8WO_5kW7n--JRDQKjFqcO31f9SG_kia2tQSmT0OK/exec';

        async function loadVideos() {
            const list = document.getElementById('list');
            list.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><p>Загрузка...</p></div>';

            try {
                const res = await fetch(SCRIPT_URL);
                const videos = await res.json();
                
                if (!videos.length) {
                    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Нет видео</p></div>';
                    return;
                }
                
                list.innerHTML = videos.map(v => `
                    <div class="card" onclick="openVideo('${v.id}')">
                        <h3>🎬 ${v.name}</h3>
                        <p><span class="badge">👁 ${v.views||0}</span> <span class="badge">❤️ ${v.likes||0}</span></p>
                    </div>
                `).join('');
            } catch(e) {
                list.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><p>Ошибка</p></div>';
            }
        }

        function openVideo(id) {
            fetch(`${SCRIPT_URL}?id=${id}`)
                .then(r => r.json())
                .then(v => {
                    show('video');
                    document.getElementById('player').innerHTML = `
                        <video controls autoplay playsinline>
                            <source src="${v.downloadUrl}" type="video/mp4">
                        </video>
                        <div class="details">
                            <h2>${v.name}</h2>
                            <p style="color:#5D6D7E;">👁 ${v.views} просмотров</p>
                            <div class="actions">
                                <button class="btn btn-like" onclick="like('${v.id}')">❤️ ${v.likes}</button>
                                <button class="btn btn-share" onclick="share()">📤</button>
                            </div>
                        </div>
                    `;
                    window.scrollTo(0,0);
                });
        }

        function like(id) {
            fetch(`${SCRIPT_URL}?action=like&id=${id}`).then(() => openVideo(id));
        }

        function share() {
            navigator.clipboard.writeText(window.location.href);
            toast('📋 Скопировано!');
        }

        function upload() {
            const file = document.getElementById('file').files[0];
            if (!file) { toast('⚠️ Выберите файл!'); return; }

            const btn = document.getElementById('submitBtn');
            const bar = document.getElementById('bar');
            const fill = document.getElementById('fill');
            
            btn.disabled = true; btn.textContent = '⏳ Загрузка...';
            bar.style.display = 'block'; fill.style.width = '0%';

            const reader = new FileReader();
            reader.onprogress = e => {
                if (e.lengthComputable) fill.style.width = (e.loaded/e.total*50) + '%';
            };
            
            reader.onload = async function(e) {
                fill.style.width = '50%';
                
                try {
                    const base64 = e.target.result.split(',')[1];
                    const res = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'upload',
                            name: document.getElementById('title').value || file.name,
                            file: base64,
                            mimeType: file.type
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (data.success) {
                        fill.style.width = '100%';
                        toast('✅ Загружено!');
                        setTimeout(() => {
                            document.getElementById('file').value = '';
                            document.getElementById('fileLabel').textContent = '📁 Выбрать видео';
                            document.getElementById('title').value = '';
                            bar.style.display = 'none';
                            btn.disabled = false; btn.textContent = '✨ Загрузить';
                            show('main');
                        }, 1000);
                    } else {
                        throw new Error(data.error);
                    }
                } catch(err) {
                    toast('❌ Ошибка');
                    btn.disabled = false; btn.textContent = '✨ Загрузить';
                    bar.style.display = 'none';
                }
            };
            
            reader.readAsDataURL(file);
        }

        function show(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-p="${page}"]`)?.classList.add('active');
            if (page === 'main') loadVideos();
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        document.getElementById('file').addEventListener('change', function() {
            if (this.files[0]) {
                document.getElementById('fileLabel').textContent = '📁 ' + this.files[0].name;
            }
        });

        loadVideos();
    </script>
</body>
</html>
