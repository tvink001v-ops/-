<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YouTuba</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:linear-gradient(180deg,#87CEEB,#4A90E2,#2E5FA1);min-height:100vh;color:#2C3E50}
        .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
        .header{background:rgba(255,255,255,0.45);backdrop-filter:blur(20px);padding:15px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;border-radius:0 0 20px 20px}
        .logo{height:28px;cursor:pointer}
        .btn{padding:10px 20px;border-radius:25px;border:none;color:white;font-weight:bold;cursor:pointer;font-size:14px}
        .btn:active{transform:scale(0.95)}
        .btn-up{background:linear-gradient(180deg,#5DADE2,#2E86C1)}
        .content{flex:1;padding:20px}
        .card{background:rgba(255,255,255,0.45);backdrop-filter:blur(20px);border-radius:20px;padding:15px;margin-bottom:15px;cursor:pointer}
        .card:active{transform:scale(0.98)}
        .card h3{color:#1a5276;margin-bottom:5px}
        .card p{color:#5D6D7E;font-size:13px}
        .page{display:none}
        .page.active{display:block}
        .back{background:rgba(255,255,255,0.45);padding:10px 20px;border-radius:25px;cursor:pointer;margin-bottom:15px;display:inline-block;font-weight:bold;color:white}
        video{width:100%;border-radius:20px;margin-bottom:15px;background:#000}
        .details{background:rgba(255,255,255,0.45);backdrop-filter:blur(20px);border-radius:20px;padding:20px}
        .details h2{color:#1a5276;margin-bottom:10px}
        .badge{background:rgba(255,255,255,0.3);padding:4px 10px;border-radius:15px;font-size:12px;margin-right:5px}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#27AE60;color:white;padding:15px 25px;border-radius:25px;font-weight:bold;z-index:1000;display:none}
        .toast.show{display:block}
        .empty{text-align:center;padding:60px 20px;color:#5D6D7E}
        .empty-icon{font-size:60px;margin-bottom:15px}
        .input{width:100%;padding:12px;border-radius:15px;border:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.3);margin-bottom:10px;font-size:16px;outline:none}
        .file-label{display:block;padding:15px;background:rgba(255,255,255,0.45);border:2px dashed rgba(255,255,255,0.4);border-radius:15px;cursor:pointer;margin-bottom:15px;text-align:center;word-break:break-all}
        .file-inp{display:none}
        .green-btn{width:100%;padding:15px;background:linear-gradient(180deg,#7DCEA0,#27AE60);border:none;border-radius:25px;color:white;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px}
        .green-btn:disabled{opacity:0.5}
        .progress{margin:15px 0;background:rgba(255,255,255,0.3);border-radius:15px;height:8px;overflow:hidden;display:none}
        .progress-fill{height:100%;background:#27AE60;border-radius:15px;width:0%;transition:width 0.3s}
        .nav{position:sticky;bottom:0;background:rgba(255,255,255,0.45);backdrop-filter:blur(20px);padding:15px;display:flex;justify-content:space-around;border-radius:20px 20px 0 0}
        .nav-btn{background:none;border:none;color:white;font-weight:bold;cursor:pointer;font-size:14px;padding:10px 20px;border-radius:20px}
        .nav-btn.active{background:rgba(255,255,255,0.3)}
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Logo_of_YouTube_%282006-2011%29.svg" class="logo" onclick="show('main')">
            <button class="btn btn-up" onclick="show('upload')">⬆️ Загрузить</button>
        </div>
        <div class="content page active" id="main">
            <div id="list"></div>
        </div>
        <div class="content page" id="video">
            <span class="back" onclick="show('main')">⬅️ Назад</span>
            <div id="player"></div>
        </div>
        <div class="content page" id="upload">
            <span class="back" onclick="show('main')">⬅️ Назад</span>
            <input type="text" class="input" id="title" placeholder="📝 Название видео">
            <label class="file-label" for="file" id="fileLabel">📁 Выбрать видео (до 10MB)</label>
            <input type="file" class="file-inp" id="file" accept="video/*">
            <div class="progress" id="bar"><div class="progress-fill" id="fill"></div></div>
            <button class="green-btn" id="submitBtn" onclick="upload()">✨ Загрузить видео</button>
        </div>
        <div class="nav">
            <button class="nav-btn active" data-p="main" onclick="show('main')">🏠 Главная</button>
            <button class="nav-btn" data-p="upload" onclick="show('upload')">⬆️ Загрузить</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // Всё хранится в localStorage браузера
        function getVideos() {
            try { return JSON.parse(localStorage.getItem('yt') || '[]'); }
            catch(e) { return []; }
        }
        
        function saveVideos(v) {
            localStorage.setItem('yt', JSON.stringify(v));
        }

        function loadVideos() {
            const list = document.getElementById('list');
            const videos = getVideos();
            
            if (!videos.length) {
                list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Нет видео</p><p style="font-size:13px;">Нажмите "Загрузить" чтобы добавить</p></div>';
                return;
            }
            
            list.innerHTML = videos.map(v => `
                <div class="card" onclick="playVideo('${v.id}')">
                    <h3>🎬 ${v.name}</h3>
                    <p><span class="badge">👁 ${v.views||0}</span> <span class="badge">❤️ ${v.likes||0}</span></p>
                </div>`).join('');
        }

        function playVideo(id) {
            const videos = getVideos();
            const v = videos.find(x => x.id === id);
            if (!v) return;
            
            v.views = (v.views||0) + 1;
            saveVideos(videos);
            
            show('video');
            document.getElementById('player').innerHTML = `
                <video controls autoplay playsinline>
                    <source src="${v.data}" type="${v.type}">
                </video>
                <div class="details">
                    <h2>${v.name}</h2>
                    <p style="color:#5D6D7E;">👁 ${v.views} просмотров</p>
                    <button class="btn" style="background:#27AE60;" onclick="like('${v.id}')">❤️ ${v.likes||0}</button>
                    <button class="btn" style="background:#E74C3C;" onclick="del('${v.id}')">🗑 Удалить</button>
                </div>`;
            window.scrollTo(0,0);
        }

        function like(id) {
            const videos = getVideos();
            const v = videos.find(x => x.id === id);
            if (v) { v.likes = (v.likes||0) + 1; saveVideos(videos); playVideo(id); }
        }

        function del(id) {
            if (confirm('Удалить видео?')) {
                saveVideos(getVideos().filter(x => x.id !== id));
                show('main');
                toast('🗑 Удалено');
            }
        }

        function upload() {
            const file = document.getElementById('file').files[0];
            if (!file) { toast('⚠️ Выберите файл!'); return; }
            
            if (file.size > 10 * 1024 * 1024) {
                toast('❌ Файл больше 10MB!');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const bar = document.getElementById('bar');
            const fill = document.getElementById('fill');
            
            btn.disabled = true; btn.textContent = '⏳ Чтение...';
            bar.style.display = 'block'; fill.style.width = '0%';

            const reader = new FileReader();
            
            reader.onprogress = function(e) {
                if (e.lengthComputable) {
                    fill.style.width = (e.loaded / e.total * 100) + '%';
                }
            };
            
            reader.onload = function(e) {
                const videos = getVideos();
                videos.unshift({
                    id: Date.now().toString(),
                    name: document.getElementById('title').value || file.name,
                    data: e.target.result,
                    type: file.type,
                    views: 0,
                    likes: 0,
                    date: new Date().toISOString()
                });
                saveVideos(videos);
                
                fill.style.width = '100%';
                btn.textContent = '✅ Готово!';
                
                setTimeout(function() {
                    document.getElementById('file').value = '';
                    document.getElementById('fileLabel').textContent = '📁 Выбрать видео (до 10MB)';
                    document.getElementById('title').value = '';
                    bar.style.display = 'none';
                    fill.style.width = '0%';
                    btn.disabled = false;
                    btn.textContent = '✨ Загрузить видео';
                    show('main');
                    toast('✅ Видео загружено!');
                }, 500);
            };
            
            reader.readAsDataURL(file);
        }

        function show(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-p="'+page+'"]')?.classList.add('active');
            if (page === 'main') loadVideos();
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2000);
        }

        document.getElementById('file').addEventListener('change', function() {
            if (this.files[0]) {
                document.getElementById('fileLabel').textContent = '📁 ' + this.files[0].name;
            }
        });

        loadVideos();
    </script>
</body>
</html>
