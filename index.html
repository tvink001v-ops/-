<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YouTuba • Frutiger Aero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #87CEEB, #4A90E2, #2E5FA1);
            min-height: 100vh;
            color: #2C3E50;
        }
        .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .header {
            background: rgba(255,255,255,0.45); backdrop-filter: blur(20px);
            padding: 15px 20px; position: sticky; top: 0; z-index: 100;
            border-radius: 0 0 20px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }
        .logo { height: 28px; cursor: pointer; }
        .header-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.4);
            font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .content { flex: 1; padding: 20px; }
        .video-list { display: flex; flex-direction: column; gap: 15px; }
        .video-card {
            background: rgba(255,255,255,0.45); backdrop-filter: blur(20px);
            border-radius: 20px; overflow: hidden; cursor: pointer; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .video-card:active { transform: scale(0.98); }
        .thumb-wrap { width: 100%; padding-top: 56.25%; background: #000; position: relative; }
        .thumb { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 12px 15px; }
        .card-title { font-size: 16px; font-weight: 600; color: #1a5276; margin-bottom: 5px; }
        .card-meta { font-size: 13px; color: #5D6D7E; display: flex; justify-content: space-between; }
        .badge { background: rgba(255,255,255,0.3); padding: 4px 10px; border-radius: 15px; font-size: 12px; }
        .page { display: none; }
        .page.active { display: block; }
        .back-btn {
            background: rgba(255,255,255,0.45); border-radius: 25px; padding: 10px 20px;
            color: white; font-weight: 600; cursor: pointer; margin-bottom: 15px; display: inline-block;
        }
        .player-wrap { background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 15px; }
        .player { width: 100%; display: block; aspect-ratio: 16/9; }
        .details-card {
            background: rgba(255,255,255,0.45); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 20px;
        }
        .details-card h2 { font-size: 20px; color: #1a5276; margin-bottom: 10px; }
        .actions { display: flex; gap: 10px; margin: 15px 0; }
        .btn {
            padding: 10px 20px; border-radius: 25px; color: white; font-weight: 600;
            cursor: pointer; border: none; font-size: 14px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-like { background: linear-gradient(180deg, #7DCEA0, #27AE60); }
        .btn-share { background: linear-gradient(180deg, #5DADE2, #2E86C1); }
        .upload-form {
            background: rgba(255,255,255,0.45); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 20px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1a5276; }
        .input {
            width: 100%; padding: 12px 15px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.3);
            font-size: 16px; outline: none; color: #2C3E50;
        }
        .file-label {
            display: flex; padding: 15px; background: rgba(255,255,255,0.45);
            border: 2px dashed rgba(255,255,255,0.4); border-radius: 15px; cursor: pointer; word-break: break-all;
        }
        .file-input { display: none; }
        .submit-btn {
            width: 100%; padding: 15px; background: linear-gradient(180deg, #7DCEA0, #27AE60);
            border: none; border-radius: 25px; color: white; font-size: 18px;
            font-weight: 700; cursor: pointer; margin-top: 20px;
        }
        .submit-btn:disabled { opacity: 0.5; }
        .progress {
            margin-top: 20px; background: rgba(255,255,255,0.3);
            border-radius: 15px; height: 8px; overflow: hidden; display: none;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(180deg, #7DCEA0, #27AE60);
            width: 0%; transition: width 0.3s;
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #27AE60; border-radius: 25px; padding: 15px 25px;
            color: white; font-weight: 600; z-index: 1000; display: none;
        }
        .toast.show { display: block; }
        .toast.error { background: #E74C3C; }
        .empty { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 60px; margin-bottom: 15px; }
        .bottom-nav {
            position: sticky; bottom: 0; background: rgba(255,255,255,0.45);
            backdrop-filter: blur(20px); padding: 10px 20px; display: flex;
            justify-content: space-around; border-radius: 20px 20px 0 0; margin-top: auto;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; background: none;
            border: none; color: white; cursor: pointer; font-size: 12px; font-weight: 600;
        }
        .nav-btn.active { background: rgba(255,255,255,0.3); border-radius: 20px; padding: 8px 15px; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Logo_of_YouTube_%282006-2011%29.svg" class="logo" onclick="show('main')">
            <button class="header-btn" onclick="show('upload')">⬆️</button>
        </div>

        <div class="content page active" id="main">
            <div class="video-list" id="list">
                <div class="empty"><div class="empty-icon">⏳</div><p>Загрузка...</p></div>
            </div>
        </div>

        <div class="content page" id="video">
            <button class="back-btn" onclick="show('main')">⬅️ Назад</button>
            <div id="videoContent"></div>
        </div>

        <div class="content page" id="upload">
            <button class="back-btn" onclick="show('main')">⬅️ Назад</button>
            <form class="upload-form" id="form">
                <div class="form-group">
                    <label>📝 Название</label>
                    <input type="text" class="input" id="title" required placeholder="Название видео">
                </div>
                <div class="form-group">
                    <label>👤 Автор</label>
                    <input type="text" class="input" id="author" value="Аноним">
                </div>
                <div class="form-group">
                    <label>🎥 Видео</label>
                    <label class="file-label" for="file" id="fileLabel">📁 Выбрать видео</label>
                    <input type="file" class="file-input" id="file" accept="video/*" required>
                </div>
                <div class="progress" id="bar"><div class="progress-fill" id="fill"></div></div>
                <button type="submit" class="submit-btn" id="submitBtn">✨ Загрузить</button>
            </form>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn active" data-p="main" onclick="show('main')">
                <span class="nav-icon">🏠</span> Главная
            </button>
            <button class="nav-btn" data-p="upload" onclick="show('upload')">
                <span class="nav-icon">⬆️</span> Загрузить
            </button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // Хранилище на GitHub Gist (бесплатно, без токена)
        const GIST_ID = localStorage.getItem('gist_id');
        
        async function getGist() {
            if (GIST_ID) {
                try {
                    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                    if (r.ok) {
                        const g = await r.json();
                        return JSON.parse(g.files['youtuba.json'].content);
                    }
                } catch(e) {}
            }
            return [];
        }
        
        async function createGist(videos) {
            const r = await fetch('https://api.github.com/gists', {
                method: 'POST',
                body: JSON.stringify({
                    public: true,
                    files: {
                        'youtuba.json': {
                            content: JSON.stringify(videos)
                        }
                    }
                })
            });
            const g = await r.json();
            localStorage.setItem('gist_id', g.id);
            return g.id;
        }
        
        async function updateGist(videos) {
            let id = GIST_ID;
            if (!id) id = await createGist(videos);
            
            await fetch(`https://api.github.com/gists/${id}`, {
                method: 'PATCH',
                body: JSON.stringify({
                    files: {
                        'youtuba.json': {
                            content: JSON.stringify(videos)
                        }
                    }
                })
            });
        }

        async function loadVideos() {
            const videos = await getGist();
            const c = document.getElementById('list');
            
            if (!videos.length) {
                c.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Нет видео</p></div>';
                return;
            }
            
            c.innerHTML = videos.map(v => `
                <div class="video-card" onclick="openVideo('${v.id}')">
                    <div class="thumb-wrap">
                        <img src="data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180"><defs><linearGradient id="g"><stop offset="0%" stop-color="#87CEEB"/><stop offset="100%" stop-color="#4A90E2"/></linearGradient></defs><rect fill="url(#g)" width="320" height="180"/><text fill="white" font-size="50" x="160" y="100" text-anchor="middle">🎬</text></svg>')}" class="thumb">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${v.title}</div>
                        <div class="card-meta">
                            <span>👤 ${v.author}</span>
                            <span class="badge">❤️ ${v.likes||0} • 👁 ${v.views||0}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openVideo(id) {
            const videos = await getGist();
            const v = videos.find(x => x.id === id);
            if (!v) return;
            
            v.views = (v.views||0) + 1;
            await updateGist(videos);
            
            show('video');
            document.getElementById('videoContent').innerHTML = `
                <div class="player-wrap">
                    <video class="player" controls autoplay playsinline>
                        <source src="${v.videoUrl}" type="video/mp4">
                    </video>
                </div>
                <div class="details-card">
                    <h2>${v.title}</h2>
                    <p style="color:#5D6D7E;margin-bottom:10px;"><strong>${v.author}</strong> • ${v.views} просмотров</p>
                    <div class="actions">
                        <button class="btn btn-like" onclick="like('${v.id}')">❤️ ${v.likes||0}</button>
                        <button class="btn btn-share" onclick="share()">📤 Поделиться</button>
                    </div>
                </div>
            `;
            window.scrollTo(0,0);
        }

        async function like(id) {
            const videos = await getGist();
            const v = videos.find(x => x.id === id);
            if (v) { v.likes = (v.likes||0) + 1; await updateGist(videos); openVideo(id); }
        }

        function share() {
            navigator.clipboard.writeText(window.location.href);
            toast('📋 Скопировано!');
        }

        document.getElementById('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const file = document.getElementById('file').files[0];
            if (!file) return;
            
            const btn = document.getElementById('submitBtn');
            const bar = document.getElementById('bar');
            const fill = document.getElementById('fill');
            
            btn.disabled = true; btn.textContent = '⏳';
            bar.style.display = 'block'; fill.style.width = '0%';
            
            const reader = new FileReader();
            reader.onprogress = e => { if (e.lengthComputable) fill.style.width = (e.loaded/e.total*100) + '%'; };
            reader.onload = async function(e) {
                const videos = await getGist();
                videos.unshift({
                    id: Date.now().toString(),
                    title: document.getElementById('title').value.trim(),
                    author: document.getElementById('author').value.trim()||'Аноним',
                    videoUrl: e.target.result,
                    likes: 0, views: 0,
                    date: new Date().toISOString()
                });
                
                await updateGist(videos);
                
                fill.style.width = '100%';
                toast('✅ Загружено!');
                
                setTimeout(() => {
                    document.getElementById('form').reset();
                    document.getElementById('fileLabel').textContent = '📁 Выбрать видео';
                    bar.style.display = 'none'; fill.style.width = '0%';
                    btn.disabled = false; btn.textContent = '✨ Загрузить';
                    show('main');
                }, 500);
            };
            reader.readAsDataURL(file);
        });

        function show(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-p="${p}"]`)?.classList.add('active');
            if (p === 'main') loadVideos();
        }

        function toast(m, t='') {
            const el = document.getElementById('toast');
            el.textContent = m; el.className = 'toast show ' + t;
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        document.getElementById('file').addEventListener('change', function() {
            if (this.files[0]) {
                document.getElementById('fileLabel').textContent = '📁 ' + this.files[0].name;
                if (!document.getElementById('title').value) {
                    document.getElementById('title').value = this.files[0].name.replace(/\.[^/.]+$/, "");
                }
            }
        });

        loadVideos();
    </script>
</body>
</html>
